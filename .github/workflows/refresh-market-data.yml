name: Refresh Islamabad Price Atlas

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh processed market data
        run: |
          python -m islamabad_market.pipeline --pages-per-seed 6

      - name: Commit refreshed dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed
          if git diff --cached --quiet; then
            echo "No processed data changes to commit."
          else
            git commit -m "chore: refresh Islamabad price atlas data"
            git push
          fi
